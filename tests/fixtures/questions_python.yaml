# Python benchmark questions — merged from real_repo_question_pack.yaml,
# click_questions.yaml, celery_questions.yaml, and publick_repo_question_pack_2.yaml.
# Includes only Python repos (fastapi, pydantic, django, flask, sqlalchemy,
# surgical_context, dathund, celery, click).

repositories:
- id: celery
  name: Celery
  clone_url: https://github.com/celery/celery.git
  repo_url: https://github.com/celery/celery
  docs_url: https://docs.celeryq.dev/
  language: python
  rationale: Task queue with app registry, broker publish/consume, and result backends—good for async dispatch, worker, and impact benchmarks.
- id: click
  name: Click
  clone_url: https://github.com/pallets/click.git
  repo_url: https://github.com/pallets/click
  docs_url: https://click.palletsprojects.com/
  language: python
  rationale: Composable CLI toolkit with decorators, Context, ParamType, and help formatting—good for registration, parsing, and error-surface benchmarks.
- id: dathund
  name: Dathund
  project_path: /home/idxoid/dathund/dathund
  language: python
  rationale: Pipeline-native security observability with connectors, lineage backends, and cross-connector ChainEngine.
- id: django
  name: Django
  clone_url: https://github.com/django/django.git
  repo_url: https://github.com/django/django
  docs_url: https://docs.djangoproject.com/
  language: python
  rationale: Large monolithic Python framework with ORM, middleware, and request lifecycle—good for testing architectural knowledge and subsystem interactions.
- id: fastapi
  name: FastAPI
  clone_url: https://github.com/fastapi/fastapi.git
  repo_url: https://github.com/fastapi/fastapi
  docs_url: https://fastapi.tiangolo.com/
  language: python
  rationale: Framework repo with code, docs, tests, and many dependency/explanation questions.
- id: flask
  name: Flask
  clone_url: https://github.com/pallets/flask.git
  repo_url: https://github.com/pallets/flask
  docs_url: https://flask.palletsprojects.com/
  language: python
  rationale: Lightweight framework with minimal core and extension system; useful for testing simplified patterns and routing complexity.
- id: pydantic
  name: Pydantic
  clone_url: https://github.com/pydantic/pydantic.git
  repo_url: https://github.com/pydantic/pydantic
  docs_url: https://docs.pydantic.dev/
  language: python
  rationale: Validation-heavy codebase with Python and core boundary, good for inspect/explain questions.
- id: sqlalchemy
  name: SQLAlchemy
  clone_url: https://github.com/sqlalchemy/sqlalchemy.git
  repo_url: https://github.com/sqlalchemy/sqlalchemy
  docs_url: https://docs.sqlalchemy.org/
  language: python
  rationale: Python ORM/database toolkit with complex declarative patterns, lazy loading, and query builder architecture—tests sophisticated Python metaprogramming and data access patterns.
- id: surgical_context
  name: Surgical Context
  project_path: /home/idxoid/surgical_context
  language: python
  rationale: Dogfood benchmark for context ranker, indexer, VS Code extension, and QA harness on this repo itself.
questions:
- id: fastapi_q01
  repo: fastapi
  core12: true
  symbol: FastAPI
  question: How does FastAPI turn a path operation function into an APIRoute and register it in the app?
  difficulty: medium
  intent: explain_behavior
  expected_mode: symbol
  mechanism: fastapi_route_registration
  required_roles:
  - public_entrypoint
  - registration_step
  - route_object
  - handler_or_lifecycle
  expected_symbols:
  - FastAPI
  - APIRoute
  - add_api_route
  - api_route
  expected_files:
  - fastapi/applications.py
  - fastapi/routing.py
- id: fastapi_q02
