- id: fastapi_q03
  repo: fastapi
  core12: true
  symbol: run_endpoint_function
  question: Where does FastAPI decide whether a path operation should run as sync or async?
  difficulty: medium
  intent: explain_behavior
  expected_mode: symbol
  mechanism: fastapi_endpoint_execution
  required_roles:
  - runtime_executor
  - handler_or_lifecycle
  - concurrency_decision
  expected_symbols:
  - run_endpoint_function
  - get_request_handler
  - APIRoute
  expected_files:
  - fastapi/routing.py
  # fastapi/concurrency.py dropped: it only re-exports run_in_threadpool from
  # starlette (`from starlette.concurrency import run_in_threadpool`), an
  # un-indexed dependency — no project symbol or RE_EXPORTS node exists for it,
  # so the file is not structurally reachable. The sync/async DECISION itself
  # lives in run_endpoint_function (routing.py), which is matched.
