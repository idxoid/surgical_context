repositories:
  - id: fastapi
    name: FastAPI
    clone_url: https://github.com/fastapi/fastapi.git
    repo_url: https://github.com/fastapi/fastapi
    docs_url: https://fastapi.tiangolo.com/
    language: python
    rationale: "Framework repo with code, docs, tests, and many dependency/explanation questions."

  - id: pydantic
    name: Pydantic
    clone_url: https://github.com/pydantic/pydantic.git
    repo_url: https://github.com/pydantic/pydantic
    docs_url: https://docs.pydantic.dev/
    language: python
    rationale: "Validation-heavy codebase with Python and core boundary, good for inspect/explain questions."

  - id: redux_toolkit
    name: Redux Toolkit
    clone_url: https://github.com/reduxjs/redux-toolkit.git
    repo_url: https://github.com/reduxjs/redux-toolkit
    docs_url: https://redux-toolkit.js.org/
    language: typescript
    rationale: "Monorepo with packages, docs, and API-heavy TS logic, useful for routing and impact checks."

  - id: django
    name: Django
    clone_url: https://github.com/django/django.git
    repo_url: https://github.com/django/django
    docs_url: https://docs.djangoproject.com/
    language: python
    rationale: "Large monolithic Python framework with ORM, middleware, and request lifecycle—good for testing architectural knowledge and subsystem interactions."

  - id: flask
    name: Flask
    clone_url: https://github.com/pallets/flask.git
    repo_url: https://github.com/pallets/flask
    docs_url: https://flask.palletsprojects.com/
    language: python
    rationale: "Lightweight framework with minimal core and extension system; useful for testing simplified patterns and routing complexity."

  - id: express
    name: Express
    clone_url: https://github.com/expressjs/express.git
    repo_url: https://github.com/expressjs/express
    docs_url: https://expressjs.com/
    language: javascript
    rationale: "Lightweight Node.js HTTP framework with app/request/response facades and routing/middleware delegation to the external router package—good for testing minimal-core patterns and package-boundary interactions."

  - id: nestjs
    name: NestJS
    clone_url: https://github.com/nestjs/nest.git
    repo_url: https://github.com/nestjs/nest
    docs_url: https://docs.nestjs.com/
    language: typescript
    rationale: "Enterprise-grade TypeScript framework with decorators, dependency injection, and modular architecture—tests architectural patterns and complex metadata systems."

  - id: sqlalchemy
    name: SQLAlchemy
    clone_url: https://github.com/sqlalchemy/sqlalchemy.git
    repo_url: https://github.com/sqlalchemy/sqlalchemy
    docs_url: https://docs.sqlalchemy.org/
    language: python
    rationale: "Python ORM/database toolkit with complex declarative patterns, lazy loading, and query builder architecture—tests sophisticated Python metaprogramming and data access patterns."

  - id: vue
    name: Vue Core
    clone_url: https://github.com/vuejs/core.git
    repo_url: https://github.com/vuejs/core
    docs_url: https://vuejs.org/
    language: typescript
    rationale: "Vue 3 core repository with runtime-core, reactivity, and compiler-core packages—tests UI framework patterns and reactive state management."

  - id: surgical_context
    name: Surgical Context
    project_path: /home/idxoid/surgical_context
    language: python
    rationale: "Dogfood benchmark for context ranker, indexer, VS Code extension, and QA harness on this repo itself."

  - id: dathund
    name: Dathund
    project_path: /home/idxoid/dathund/dathund
    language: python
    rationale: "Pipeline-native security observability with connectors, lineage backends, and cross-connector ChainEngine."

questions:
  # ==========================================
  # 1. FastAPI
  # ==========================================
  - id: fastapi_new_q01
    repo: fastapi
    symbol: RequestValidationError
    question: "How does FastAPI catch Pydantic validation errors and transform them into 422 HTTP responses?"
    required_roles: [error_surface, registration_step, runtime_surface, factory_surface]
    expected_symbols: [RequestValidationError, request_validation_exception_handler, exception_handler]
    expected_files: [fastapi/exceptions.py, fastapi/exception_handlers.py]

  - id: fastapi_new_q02
    repo: fastapi
    symbol: BackgroundTasks
    question: "How are BackgroundTasks integrated into the response lifecycle and executed after the response is sent?"
    required_roles: [api_surface, composition_surface, runtime_surface, executor]
    expected_symbols: [BackgroundTasks, add_task, Response]
    expected_files: [fastapi/background.py, fastapi/routing.py]

  - id: fastapi_new_q03
    repo: fastapi
    symbol: lifespan
    question: "How does the lifespan async context manager replace startup and shutdown events in modern FastAPI?"
    required_roles: [api_surface, config_surface, runtime_surface, orchestrator]
    expected_symbols: [lifespan, Router, FastAPI, asynccontextmanager]
    expected_files: [fastapi/routing.py, fastapi/applications.py]

  - id: fastapi_new_q04
