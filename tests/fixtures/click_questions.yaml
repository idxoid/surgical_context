# Click (pallets/click) benchmark slice — merged into real_repo_question_pack.yaml via `includes`.
#
# Run standalone:
#   PYTHONPATH=. .venv/bin/python QA/qa_benchmark.py \
#     --questions tests/fixtures/click_questions.yaml --repo click --no-index

repositories:
  - id: click
    name: Click
    clone_url: https://github.com/pallets/click.git
    repo_url: https://github.com/pallets/click
    docs_url: https://click.palletsprojects.com/
    language: python
    rationale: "Composable CLI toolkit with decorators, Context, ParamType, and help formatting—good for registration, parsing, and error-surface benchmarks."

questions:
  - id: click_q01
    repo: click
    core12: false
    symbol: command
    question: "How is a function registered as a CLI command and attached to a command group in Click?"
    difficulty: medium
    intent: explain_behavior
    expected_mode: symbol
    mechanism: click_command_registration
    required_roles_canonical:
      - api_surface
      - factory_surface
      - representation_surface
      - runtime_surface
    expected_symbols: [command, group, Command, Group, _make_command, add_command]
    expected_files: [src/click/decorators.py, src/click/core.py]

  - id: click_q02
    repo: click
    core12: false
    symbol: Command.invoke
    question: "How does Click parse command-line arguments and pass them to the underlying command function?"
    difficulty: hard
    intent: trace_dependency
    expected_mode: symbol
    mechanism: click_invoke_argument_parsing
    required_roles_canonical:
      - orchestrator
      - validator_handle
      - executor
      - runtime_surface
    expected_symbols: [Command, invoke, make_context, parse_args, Context]
    expected_files: [src/click/core.py, src/click/parser.py]

  - id: click_q03
    repo: click
    core12: false
    symbol: Context
    question: "How does Click's Context object manage state and pass it between parent and child commands?"
    difficulty: medium
    intent: explain_behavior
    expected_mode: symbol
    mechanism: click_context_state
    required_roles_canonical:
      - core_runtime
      - composition_surface
      - orchestrator
    expected_symbols: [Context, pass_context, pass_obj, invoke]
    expected_files: [src/click/core.py, src/click/decorators.py]

  - id: click_q04
    repo: click
    core12: false
    symbol: ParamType.convert
    question: "If I change the validation and conversion logic inside a custom Click ParamType, what parts of the system and tests might break?"
    difficulty: hard
    intent: impact_analysis
    expected_mode: symbol
    mechanism: click_paramtype_impact
    required_roles_canonical:
      - impact_runtime
      - impact_public_api
      - impact_test_surface
    expected_symbols: [ParamType, convert, Option, Argument]
    expected_files: [src/click/types.py, src/click/core.py, tests]

  - id: click_q05
    repo: click
    core12: false
    symbol: UsageError
    question: "How does Click handle and format UsageError before displaying the help message to the user?"
    difficulty: medium
    intent: explain_behavior
    expected_mode: symbol
    mechanism: click_usage_error_formatting
    required_roles_canonical:
      - error_surface
      - representation_surface
      - runtime_surface
    expected_symbols: [UsageError, HelpFormatter, format_usage, echo]
    expected_files: [src/click/exceptions.py, src/click/core.py, src/click/formatting.py]
