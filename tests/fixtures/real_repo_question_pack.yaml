# Starter pack for real-repository benchmark work.
#
# Purpose:
# - manual / semi-manual benchmark on real open-source repositories
# - compare naive context vs Surgical Context vs heavy stuffing
# - pressure-test symbol/file/workspace/direct_llm fallback behavior
#
# Notes:
# - `core12: true` marks the first 12 questions to run before the full 24.
# - `expected_symbols` and `expected_files` are seed hypotheses, not final labels.
#   They should be corrected after the first human-reviewed benchmark pass.
# - This file is intentionally separate from tests/fixtures/sample_project/questions.yaml.

repositories:
  - id: fastapi
    name: FastAPI
    clone_url: https://github.com/fastapi/fastapi.git
    repo_url: https://github.com/fastapi/fastapi
    docs_url: https://fastapi.tiangolo.com/
    language: python
    rationale: "Framework repo with code, docs, tests, and many dependency/explanation questions."

  - id: pydantic
    name: Pydantic
    clone_url: https://github.com/pydantic/pydantic.git
    repo_url: https://github.com/pydantic/pydantic
    docs_url: https://docs.pydantic.dev/
    language: python
    rationale: "Validation-heavy codebase with Python and core boundary, good for inspect/explain questions."

  - id: redux_toolkit
    name: Redux Toolkit
    clone_url: https://github.com/reduxjs/redux-toolkit.git
    repo_url: https://github.com/reduxjs/redux-toolkit
    docs_url: https://redux-toolkit.js.org/
    language: typescript
    rationale: "Monorepo with packages, docs, and API-heavy TS logic, useful for routing and impact checks."

  - id: django
    name: Django
    clone_url: https://github.com/django/django.git
    repo_url: https://github.com/django/django
    docs_url: https://docs.djangoproject.com/
    language: python
    rationale: "Large monolithic Python framework with ORM, middleware, and request lifecycle—good for testing architectural knowledge and subsystem interactions."

  - id: flask
    name: Flask
    clone_url: https://github.com/pallets/flask.git
    repo_url: https://github.com/pallets/flask
    docs_url: https://flask.palletsprojects.com/
    language: python
    rationale: "Lightweight framework with minimal core and extension system; useful for testing simplified patterns and routing complexity."

  - id: express
    name: Express
    clone_url: https://github.com/expressjs/express.git
    repo_url: https://github.com/expressjs/express
    docs_url: https://expressjs.com/
    language: javascript
    rationale: "Lightweight Node.js HTTP framework with middleware, routing, and request/response chains—good for testing minimal-core patterns and middleware interactions."

  - id: nestjs
    name: NestJS
    clone_url: https://github.com/nestjs/nest.git
    repo_url: https://github.com/nestjs/nest
    docs_url: https://docs.nestjs.com/
    language: typescript
    rationale: "Enterprise-grade TypeScript framework with decorators, dependency injection, and modular architecture—tests architectural patterns and complex metadata systems."

  - id: sqlalchemy
    name: SQLAlchemy
    clone_url: https://github.com/sqlalchemy/sqlalchemy.git
    repo_url: https://github.com/sqlalchemy/sqlalchemy
    docs_url: https://docs.sqlalchemy.org/
    language: python
    rationale: "Python ORM/database toolkit with complex declarative patterns, lazy loading, and query builder architecture—tests sophisticated Python metaprogramming and data access patterns."

  - id: vue
    name: Vue
    clone_url: https://github.com/vuejs/vue.git
    repo_url: https://github.com/vuejs/vue
    docs_url: https://vuejs.org/
    language: typescript
    rationale: "JavaScript/TypeScript frontend framework with reactive systems, component lifecycle, and template compilation—tests UI framework patterns and reactive state management."

