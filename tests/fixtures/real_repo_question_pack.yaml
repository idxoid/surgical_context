# Starter pack for real-repository benchmark work.
#
# Purpose:
# - manual / semi-manual benchmark on real open-source repositories
# - compare naive context vs Surgical Context vs heavy stuffing
# - pressure-test symbol/file/workspace/direct_llm fallback behavior
#
# Notes:
# - `core12: true` marks the first 12 questions to run before the full 24.
# - `expected_symbols` and `expected_files` are seed hypotheses, not final labels.
#   They should be corrected after the first human-reviewed benchmark pass.
# - This file is intentionally separate from tests/fixtures/sample_project/questions.yaml.

repositories:
  - id: fastapi
    name: FastAPI
    clone_url: https://github.com/fastapi/fastapi.git
    repo_url: https://github.com/fastapi/fastapi
    docs_url: https://fastapi.tiangolo.com/
    language: python
    rationale: "Framework repo with code, docs, tests, and many dependency/explanation questions."

  - id: pydantic
    name: Pydantic
    clone_url: https://github.com/pydantic/pydantic.git
    repo_url: https://github.com/pydantic/pydantic
    docs_url: https://docs.pydantic.dev/
    language: python
    rationale: "Validation-heavy codebase with Python and core boundary, good for inspect/explain questions."

  - id: redux_toolkit
    name: Redux Toolkit
    clone_url: https://github.com/reduxjs/redux-toolkit.git
    repo_url: https://github.com/reduxjs/redux-toolkit
    docs_url: https://redux-toolkit.js.org/
    language: typescript
    rationale: "Monorepo with packages, docs, and API-heavy TS logic, useful for routing and impact checks."

questions:
  - id: fastapi_q01
    repo: fastapi
    core12: true
    symbol: FastAPI
    question: "How does FastAPI turn a path operation function into an APIRoute and register it in the app?"
    difficulty: medium
    intent: explain_behavior
    expected_mode: symbol
    mechanism: fastapi_route_registration
    required_roles: [public_entrypoint, registration_step, route_object, handler_or_lifecycle]
    expected_symbols: [FastAPI, APIRoute, add_api_route, api_route]
    expected_files: [fastapi/applications.py, fastapi/routing.py]

  - id: fastapi_q02
    repo: fastapi
    core12: true
    symbol: Depends
    question: "How does dependency injection get resolved before the endpoint function is called?"
    difficulty: hard
    intent: trace_dependency
    expected_mode: symbol
    mechanism: fastapi_dependency_injection
    required_roles: [public_entrypoint, marker_or_config, intermediate_model, dependency_solver, handler_or_lifecycle]
    expected_symbols: [Depends, solve_dependencies, get_dependant, Dependant]
    expected_files: [fastapi/dependencies/utils.py, fastapi/dependencies/models.py]

  - id: fastapi_q03
    repo: fastapi
    core12: true
    symbol: run_endpoint_function
    question: "Where does FastAPI decide whether a path operation should run as sync or async?"
    difficulty: medium
    intent: explain_behavior
    expected_mode: symbol
    mechanism: fastapi_endpoint_execution
    required_roles: [runtime_executor, handler_or_lifecycle, concurrency_decision]
    expected_symbols: [run_endpoint_function, get_request_handler, APIRoute]
    expected_files: [fastapi/routing.py]

  - id: fastapi_q04
    repo: fastapi
    core12: true
    symbol: request_body_to_args
    question: "How are request body models validated and then passed into endpoint parameters?"
    difficulty: hard
    intent: trace_dependency
    expected_mode: symbol
    mechanism: fastapi_request_body_dependency_resolution
    required_roles: [handler_or_lifecycle, body_field_builder, dependency_solver, body_argument_mapper]
    expected_symbols: [request_body_to_args, solve_dependencies, get_body_field, get_request_handler]
    expected_files: [fastapi/routing.py, fastapi/dependencies/utils.py]

  - id: fastapi_q05
    repo: fastapi
    core12: false
    symbol: get_openapi
    question: "How does FastAPI generate OpenAPI for registered routes?"
    difficulty: medium
    intent: explain_behavior
    expected_mode: symbol
    expected_symbols: [get_openapi, openapi, routes]
    expected_files: [fastapi/openapi/utils.py, fastapi/applications.py]

  - id: fastapi_q06
    repo: fastapi
    core12: false
    symbol: serialize_response
    question: "If I change response model serialization behavior, what parts of the framework and tests are most likely to break?"
    difficulty: hard
    intent: impact_analysis
    expected_mode: symbol
    expected_symbols: [serialize_response, APIRoute, response_model]
    expected_files: [fastapi/routing.py, tests]

  - id: fastapi_q07
    repo: fastapi
    core12: false
    symbol: FastAPI
    question: "How are /docs and /redoc routes created and wired into the application?"
    difficulty: medium
    intent: explain_behavior
    expected_mode: symbol
    expected_symbols: [FastAPI, swagger_ui_html, redoc_html, setup]
    expected_files: [fastapi/applications.py, fastapi/openapi/docs.py]

  - id: fastapi_q08
    repo: fastapi
    core12: false
    symbol: RouteContext
    question: "Where is RouteContext implemented, and if it does not exist, what is the nearest real mechanism FastAPI uses instead?"
    difficulty: medium
    intent: explain_behavior
    expected_mode: workspace
    expected_symbols: [APIRoute, get_request_handler, Dependant]
    expected_files: [fastapi/routing.py, fastapi/dependencies]

  - id: pydantic_q01
    repo: pydantic
    core12: true
    symbol: BaseModel
