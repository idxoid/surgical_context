name: CI
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  type-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt -r mcp_server/requirements.txt
      - run: PYTHONPATH=${{ github.workspace }} mypy context_engine/ mcp_server/surgical_context_mcp tests/

  test:
    needs: type-check
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.12-community
        env:
          NEO4J_AUTH: none
          NEO4J_PLUGINS: '["apoc"]'
        options: >-
          --health-cmd "cypher-shell -u neo4j 'RETURN 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 7687:7687
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt -r mcp_server/requirements.txt
      - name: Unit tests
        env:
          NEO4J_URI: bolt://neo4j:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ""
        run: PYTHONPATH=${{ github.workspace }} pytest tests/unit/ -v
      - name: Integration tests and P7 axis benchmark gate
        env:
          INDEX_PROFILE: axis_python_v1
          NEO4J_URI: bolt://neo4j:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: ""
        run: PYTHONPATH=${{ github.workspace }} pytest tests/integration/ --run-integration -v
